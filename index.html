<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body class="bg-dark bg-gradient">
    


<div class="position-absolute top-50 start-50 translate-middle">

<div class="card p-4" style="width: 30rem;">
  <div class="card-body">
    <h1  class="card-title">Викторина </h1>

<div class="mb-2">
      <select class="form-select" aria-label="Default select example" id="selectQuestions">

</select>
</div>


<div class="mb-5">
  <div  class="d-grid gap-2">

</div>
</div>

<div class="mb-2">
     <div class="input-group flex-nowrap">
  
  <input id="ansInput"   placeholder="Ваш ответ" type="text" class="form-control"  aria-label="Username" aria-describedby="addon-wrapping">
</div>
 </div>
<div calss="mb-1"><div class="d-grid gap-2">

</div>
</div>

<nav aria-label="breadcrumb">

  </ol>
</nav>

</div>
  </div>
</div>
 </div>
  </div>
